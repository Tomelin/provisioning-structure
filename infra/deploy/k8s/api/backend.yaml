apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: api-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: development
            - name: APP_MONGO_URI
              value: "mongodb://admin:password@mongodb:27017"
            - name: APP_REDIS_ADDR
              value: "redis:6379"
            - name: APP_RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
